name: Docker Debian
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to checkout"
        default: ""
        required: false
  schedule:
    - cron:  '07 16 * * THU'

jobs:
  run-build:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    with:
      osname: 'debian'
      osstablever: 'bookworm'
      pythonvers: '[ "3.11", "3.12", "3.13" ]'
      osvers: '[ "bookworm", "trixie" ]'
      branch: '${{ github.event.inputs.branch }}'
